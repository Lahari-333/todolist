<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Tenant Task Manager</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'DM Sans', sans-serif;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      background-color: #1e1e2e;
      color: #e2e8f0;
    }

    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .scale-on-hover {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .scale-on-hover:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 16px rgba(245, 158, 11, 0.1);
    }

    .button-primary {
      background-color: #f59e0b;
      color: #000;
      font-weight: 600;
      border-radius: 8px;
      padding: 10px 16px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .button-primary:hover {
      background-color: #d97706;
      transform: scale(1.02);
    }

    .button-primary:disabled {
      background-color: #64748b;
      cursor: not-allowed;
      transform: scale(1);
    }

    .button-secondary {
      background-color: #475569;
      color: #fff;
      font-weight: 500;
      border-radius: 8px;
      padding: 8px 12px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s ease;
    }

    .button-secondary:hover {
      background-color: #64748b;
    }

    .card {
      background-color: #2a2a3e;
      border: 1px solid #475569;
      border-radius: 12px;
      padding: 16px;
      transition: all 0.2s ease;
    }

    .card:hover {
      border-color: #f59e0b;
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.08);
    }

    .input-field {
      background-color: #1e1e2e;
      border: 1px solid #475569;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .input-field:focus {
      outline: none;
      border-color: #f59e0b;
      box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.1);
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-admin {
      background-color: #f59e0b;
      color: #000;
    }

    .badge-member {
      background-color: #475569;
      color: #e2e8f0;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }

    .modal-content {
      background-color: #2a2a3e;
      border-radius: 16px;
      padding: 24px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 25px rgba(0, 0, 0, 0.3);
    }

    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-todo {
      background-color: rgba(59, 130, 246, 0.2);
      color: #3b82f6;
    }

    .status-in-progress {
      background-color: rgba(245, 158, 11, 0.2);
      color: #f59e0b;
    }

    .status-done {
      background-color: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }

    .priority-low {
      background-color: rgba(100, 116, 139, 0.2);
      color: #64748b;
    }

    .priority-medium {
      background-color: rgba(245, 158, 11, 0.2);
      color: #f59e0b;
    }

    .priority-high {
      background-color: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    .grid-responsive {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }
      .grid-responsive {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <div id="app"></div>
  <script>
    // ============================================
    // STATE MANAGEMENT
    // ============================================
    let currentUser = null;
    let tasks = [];
    let auditLog = [];
    let currentPage = 'tasks';
    let filterStatus = 'all';
    let editingTask = null;
    let showModal = false;

    // ============================================
    // LOCAL STORAGE (since Data SDK is not available in VS Code)
    // ============================================
    function saveTasks() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function loadTasks() {
      const saved = localStorage.getItem('tasks');
      tasks = saved ? JSON.parse(saved) : [];
    }

    function saveAuditLog() {
      localStorage.setItem('auditLog', JSON.stringify(auditLog));
    }

    function loadAuditLog() {
      const saved = localStorage.getItem('auditLog');
      auditLog = saved ? JSON.parse(saved) : [];
    }

    // ============================================
    // LOGIN SCREEN
    // ============================================
    function renderLogin() {
      document.getElementById('app').innerHTML = `
        <div style="height: 100%; width: 100%; display: flex; align-items: center; justify-content: center; padding: 16px; background: linear-gradient(135deg, #1e1e2e, #0f0f1a);">
          <div class="fade-in" style="width: 100%; max-width: 400px; background-color: #2a2a3e; border-radius: 16px; padding: 32px; box-shadow: 0 20px 25px rgba(0, 0, 0, 0.3);">
            <h1 style="text-align: center; font-size: 24px; font-weight: 700; margin-bottom: 24px; color: #f59e0b;">Multi-Tenant Task Manager</h1>
            
            <div style="display: flex; flex-direction: column; gap: 16px;">
              <div>
                <label style="display: block; font-size: 12px; margin-bottom: 6px; color: #94a3b8;">Your Name</label>
                <input type="text" id="login-name" placeholder="Enter your name" class="input-field" style="width: 100%;">
              </div>

              <div>
                <label style="display: block; font-size: 12px; margin-bottom: 6px; color: #94a3b8;">Organization</label>
                <select id="login-org" class="input-field" style="width: 100%; cursor: pointer;">
                  <option value="alpha">Alpha</option>
                  <option value="beta">Beta</option>
                  <option value="gamma">Gamma</option>
                </select>
              </div>

              <div>
                <label style="display: block; font-size: 12px; margin-bottom: 6px; color: #94a3b8;">Role</label>
                <select id="login-role" class="input-field" style="width: 100%; cursor: pointer;">
                  <option value="admin">Admin</option>
                  <option value="member">Member</option>
                </select>
              </div>

              <button onclick="handleLogin()" class="button-primary" style="width: 100%; padding: 12px; font-size: 16px; margin-top: 8px;">Sign In</button>
            </div>

            <p style="text-align: center; font-size: 11px; color: #64748b; margin-top: 16px;">🎭 Demo Mode – simulated authentication</p>
          </div>
        </div>
      `;
    }

    function handleLogin() {
      const name = document.getElementById('login-name').value.trim();
      const org = document.getElementById('login-org').value;
      const role = document.getElementById('login-role').value;

      if (!name) {
        alert('Please enter your name');
        return;
      }

      currentUser = { name, org, role };
      loadTasks();
      loadAuditLog();
      renderDashboard();
    }

    function logout() {
      currentUser = null;
      currentPage = 'tasks';
      filterStatus = 'all';
      editingTask = null;
      showModal = false;
      renderLogin();
    }

    // ============================================
    // DASHBOARD
    // ============================================
    function renderDashboard() {
      const orgTasks = tasks.filter(t => t.org_id === currentUser.org);
      const filteredTasks = filterStatus === 'all' ? orgTasks : orgTasks.filter(t => t.status === filterStatus);

      let mainContent = '';
      if (currentPage === 'tasks') {
        mainContent = renderTasksPage(filteredTasks);
      } else if (currentPage === 'audit') {
        mainContent = renderAuditPage();
      } else if (currentPage === 'info') {
        mainContent = renderInfoPage();
      }

      document.getElementById('app').innerHTML = `
        <div style="height: 100%; width: 100%; display: flex; flex-direction: column;">
          <!-- NAVBAR -->
          <header style="display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid #475569; background-color: #2a2a3e;">
            <span style="font-size: 16px; font-weight: 700; color: #f59e0b;">📊 Multi-Tenant Task Manager</span>
            <div style="display: flex; align-items: center; gap: 12px;">
              <span style="font-size: 14px;">${currentUser.name}</span>
              <span class="badge ${currentUser.role === 'admin' ? 'badge-admin' : 'badge-member'}">${currentUser.role.toUpperCase()}</span>
              <button onclick="logout()" class="button-secondary">Logout</button>
            </div>
          </header>

          <div style="display: flex; flex-1; overflow: hidden;">
            <!-- SIDEBAR -->
            <aside class="sidebar" style="width: 224px; border-right: 1px solid #475569; padding: 16px; background-color: #1e1e2e; display: flex; flex-direction: column; gap: 8px; overflow-y: auto;">
              <div style="margin-bottom: 16px; padding: 12px; border-radius: 12px; background-color: #2a2a3e;">
                <p style="font-size: 11px; color: #94a3b8;">Organization</p>
                <p style="font-size: 14px; font-weight: 600; color: #f59e0b; margin-top: 4px; text-transform: capitalize;">${currentUser.org}</p>
                <p style="font-size: 11px; color: #64748b; margin-top: 4px;">ID: org_${currentUser.org}</p>
              </div>

              <button onclick="switchPage('tasks')" style="width: 100%; text-align: left; padding: 10px 16px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; transition: all 0.2s ease; background-color: ${currentPage === 'tasks' ? '#475569' : 'transparent'}; color: ${currentPage === 'tasks' ? '#f59e0b' : '#e2e8f0'}; font-weight: ${currentPage === 'tasks' ? '600' : '500'};">📝 Tasks</button>

              <button onclick="switchPage('audit')" style="width: 100%; text-align: left; padding: 10px 16px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; transition: all 0.2s ease; background-color: ${currentPage === 'audit' ? '#475569' : 'transparent'}; color: ${currentPage === 'audit' ? '#f59e0b' : '#e2e8f0'}; font-weight: ${currentPage === 'audit' ? '600' : '500'};">📋 Audit Log</button>

              <button onclick="switchPage('info')" style="width: 100%; text-align: left; padding: 10px 16px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; transition: all 0.2s ease; background-color: ${currentPage === 'info' ? '#475569' : 'transparent'}; color: ${currentPage === 'info' ? '#f59e0b' : '#e2e8f0'}; font-weight: ${currentPage === 'info' ? '600' : '500'};">ℹ️ System Info</button>
            </aside>

            <!-- MAIN CONTENT -->
            <main style="flex: 1; overflow-y: auto; padding: 24px;">
              ${mainContent}
            </main>
          </div>
        </div>

        ${showModal ? renderModal() : ''}
      `;

      lucide.createIcons();
    }

    // ============================================
    // TASKS PAGE
    // ============================================
    function renderTasksPage(filteredTasks) {
      return `
        <div class="fade-in">
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;">
            <h2 style="font-size: 24px; font-weight: 700;">Tasks</h2>
            <button onclick="openModal()" class="button-primary">+ New Task</button>
          </div>

          <div style="display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;">
            <button onclick="setFilter('all')" style="padding: 8px 12px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; background-color: ${filterStatus === 'all' ? '#f59e0b' : '#2a2a3e'}; color: ${filterStatus === 'all' ? '#000' : '#e2e8f0'}; font-weight: ${filterStatus === 'all' ? '600' : '500'}; transition: all 0.2s ease;">All</button>
            <button onclick="setFilter('todo')" style="padding: 8px 12px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; background-color: ${filterStatus === 'todo' ? '#f59e0b' : '#2a2a3e'}; color: ${filterStatus === 'todo' ? '#000' : '#e2e8f0'}; font-weight: ${filterStatus === 'todo' ? '600' : '500'}; transition: all 0.2s ease;">To Do</button>
            <button onclick="setFilter('in_progress')" style="padding: 8px 12px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; background-color: ${filterStatus === 'in_progress' ? '#f59e0b' : '#2a2a3e'}; color: ${filterStatus === 'in_progress' ? '#000' : '#e2e8f0'}; font-weight: ${filterStatus === 'in_progress' ? '600' : '500'}; transition: all 0.2s ease;">In Progress</button>
            <button onclick="setFilter('done')" style="padding: 8px 12px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; background-color: ${filterStatus === 'done' ? '#f59e0b' : '#2a2a3e'}; color: ${filterStatus === 'done' ? '#000' : '#e2e8f0'}; font-weight: ${filterStatus === 'done' ? '600' : '500'}; transition: all 0.2s ease;">Done</button>
          </div>

          ${filteredTasks.length === 0 ? `
            <div style="text-align: center; padding: 48px 16px; color: #64748b;">
              <p style="font-size: 16px; margin-bottom: 8px;">📭 No tasks found</p>
              <p style="font-size: 14px;">Create a new task to get started</p>
            </div>
          ` : `
            <div class="grid-responsive">
              ${filteredTasks.map(task => renderTaskCard(task)).join('')}
            </div>
          `}
        </div>
      `;
    }

    function renderTaskCard(task) {
      const canEdit = currentUser.role === 'admin' || task.created_by === currentUser.name;
      const statusClass = `status-${task.status}`;
      const priorityClass = `priority-${task.priority}`;

      return `
        <div class="card fade-in">
          <div style="display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px;">
            <h3 style="font-size: 16px; font-weight: 600; flex: 1;">${task.title}</h3>
            <span class="status-badge ${statusClass}">${task.status.replace('_', ' ').toUpperCase()}</span>
          </div>

          <span class="badge ${priorityClass}" style="display: inline-block; margin-bottom: 12px;">${task.priority.toUpperCase()}</span>

          <p style="font-size: 14px; color: #94a3b8; margin-bottom: 12px; min-height: 40px;">${task.description || 'No description provided'}</p>

          <p style="font-size: 12px; color: #64748b; margin-bottom: 12px;">👤 ${task.created_by} • ${new Date(task.created_at).toLocaleDateString()}</p>

          ${canEdit ? `
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
              <select onchange="changeStatus('${task.id}', this.value)" class="input-field" style="flex: 1; font-size: 12px;">
                <option value="">Change status...</option>
                <option value="todo" ${task.status === 'todo' ? 'selected' : ''}>To Do</option>
                <option value="in_progress" ${task.status === 'in_progress' ? 'selected' : ''}>In Progress</option>
                <option value="done" ${task.status === 'done' ? 'selected' : ''}>Done</option>
              </select>
              <button onclick="editTask('${task.id}')" class="button-secondary">✏️ Edit</button>
              <button onclick="deleteTaskConfirm('${task.id}')" class="button-secondary" style="background-color: #7f1d1d; color: #fca5a5;">🗑️ Delete</button>
            </div>
          ` : `
            <p style="font-size: 12px; color: #64748b; font-style: italic;">📖 View only (not your task)</p>
          `}
        </div>
      `;
    }

    // ============================================
    // AUDIT LOG PAGE
    // ============================================
    function renderAuditPage() {
      return `
        <div class="fade-in">
          <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 24px;">Audit Log</h2>

          ${auditLog.length === 0 ? `
            <div style="text-align: center; padding: 48px 16px; color: #64748b;">
              <p>📭 No audit entries yet</p>
            </div>
          ` : `
            <div style="display: flex; flex-direction: column; gap: 12px;">
              ${auditLog.map((entry, idx) => `
                <div class="card" style="display: flex; align-items: center; gap: 12px;">
                  <div style="width: 8px; height: 8px; border-radius: 50%; background-color: #f59e0b; flex-shrink: 0;"></div>
                  <div style="flex: 1;">
                    <p style="font-size: 14px;">
                      <span style="font-weight: 600;">${entry.user}</span>
                      <span style="color: #94a3b8;"> ${entry.action} </span>
                      <span style="font-weight: 600; color: #f59e0b;">"${entry.task}"</span>
                    </p>
                  </div>
                  <p style="font-size: 12px; color: #64748b; white-space: nowrap;">${entry.time}</p>
                </div>
              `).join('')}
            </div>
          `}
        </div>
      `;
    }

    // ============================================
    // SYSTEM INFO PAGE
    // ============================================
    function renderInfoPage() {
      const cards = [
        {
          title: '🔐 Tenant Isolation',
          desc: 'Each organization (Alpha, Beta, Gamma) has completely isolated data via org_id filtering. Tasks belong to a single tenant only.'
        },
        {
          title: '👥 Role-Based Access',
          desc: 'Admins can manage all tasks. Members can only edit/delete their own tasks. Access is enforced at render time.'
        },
        {
          title: '🔑 JWT Authentication',
          desc: 'In production, JWT tokens carry user identity, role, and org claims for stateless authentication and authorization.'
        },
        {
          title: '🐳 Containerization',
          desc: 'This app is designed for Docker deployment with isolated services, environment variables, and horizontal scaling.'
        }
      ];

      return `
        <div class="fade-in">
          <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 24px;">System Info</h2>
          <div class="grid-responsive">
            ${cards.map(card => `
              <div class="card">
                <h3 style="font-size: 16px; font-weight: 600; color: #f59e0b; margin-bottom: 8px;">${card.title}</h3>
                <p style="font-size: 14px; color: #94a3b8; line-height: 1.6;">${card.desc}</p>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    // ============================================
    // MODAL (Create/Edit Task)
    // ============================================
    function renderModal() {
      const isEdit = editingTask !== null;
      const task = editingTask || { title: '', description: '', status: 'todo', priority: 'medium' };

      return `
        <div class="modal-overlay" onclick="if (event.target === this) closeModal();">
          <div class="modal-content fade-in">
            <h3 style="font-size: 20px; font-weight: 700; margin-bottom: 20px;">${isEdit ? '✏️ Edit Task' : '✨ New Task'}</h3>

            <form onsubmit="handleTaskSubmit(event, ${isEdit})" style="display: flex; flex-direction: column; gap: 16px;">
              <div>
                <label style="display: block; font-size: 12px; margin-bottom: 6px; color: #94a3b8; font-weight: 500;">Title *</label>
                <input type="text" id="modal-title" value="${task.title}" placeholder="Enter task title" class="input-field" style="width: 100%;" required>
              </div>

              <div>
                <label style="display: block; font-size: 12px; margin-bottom: 6px; color: #94a3b8; font-weight: 500;">Description</label>
                <textarea id="modal-description" placeholder="Enter task description" class="input-field" style="width: 100%; min-height: 80px; resize: vertical;">${task.description}</textarea>
              </div>

              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div>
                  <label style="display: block; font-size: 12px; margin-bottom: 6px; color: #94a3b8; font-weight: 500;">Status</label>
                  <select id="modal-status" class="input-field" style="width: 100%;">
                    <option value="todo" ${task.status === 'todo' ? 'selected' : ''}>To Do</option>
                    <option value="in_progress" ${task.status === 'in_progress' ? 'selected' : ''}>In Progress</option>
                    <option value="done" ${task.status === 'done' ? 'selected' : ''}>Done</option>
                  </select>
                </div>

                <div>
                  <label style="display: block; font-size: 12px; margin-bottom: 6px; color: #94a3b8; font-weight: 500;">Priority</label>
                  <select id="modal-priority" class="input-field" style="width: 100%;">
                    <option value="low" ${task.priority === 'low' ? 'selected' : ''}>Low</option>
                    <option value="medium" ${task.priority === 'medium' ? 'selected' : ''}>Medium</option>
                    <option value="high" ${task.priority === 'high' ? 'selected' : ''}>High</option>
                  </select>
                </div>
              </div>

              <div style="display: flex; gap: 12px; margin-top: 8px;">
                <button type="submit" id="modal-submit" class="button-primary" style="flex: 1; padding: 12px;">${isEdit ? 'Update Task' : 'Create Task'}</button>
                <button type="button" onclick="closeModal()" class="button-secondary" style="flex: 1; padding: 12px;">Cancel</button>
              </div>
            </form>
          </div>
        </div>
      `;
    }

    // ============================================
    // TASK OPERATIONS
    // ============================================
    function openModal() {
      editingTask = null;
      showModal = true;
      renderDashboard();
    }

    function editTask(id) {
      editingTask = tasks.find(t => t.id === id) || null;
      showModal = true;
      renderDashboard();
    }

    function closeModal() {
      showModal = false;
      editingTask = null;
      renderDashboard();
    }

    function handleTaskSubmit(event, isEdit) {
      event.preventDefault();

      const title = document.getElementById('modal-title').value.trim();
      const description = document.getElementById('modal-description').value.trim();
      const status = document.getElementById('modal-status').value;
      const priority = document.getElementById('modal-priority').value;

      if (!title) {
        alert('Please enter a task title');
        return;
      }

      if (isEdit && editingTask) {
        // Update existing task
        const taskIndex = tasks.findIndex(t => t.id === editingTask.id);
        if (taskIndex !== -1) {
          tasks[taskIndex] = {
            ...tasks[taskIndex],
            title,
            description,
            status,
            priority,
            updated_at: new Date().toISOString()
          };
          addAudit('updated', title);
          saveTasks();
        }
      } else {
        // Create new task
        const newTask = {
          id: Date.now().toString(),
          title,
          description,
          status,
          priority,
          org_id: currentUser.org,
          created_by: currentUser.name,
          created_at: new Date().toISOString(),
          updated_at: new Date().toISOString()
        };
        tasks.push(newTask);

function openModal() { editingTask = null; showModal = true; renderDashboard(); }

function closeModal(e) { if (e.target === e.currentTarget) { showModal = false; renderDashboard(); } }

async function handleTaskSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('m-submit');
  btn.disabled = true; btn.textContent = 'Saving...';
  const title = document.getElementById('m-title').value.trim();
  const description = document.getElementById('m-desc').value.trim();
  const status = document.getElementById('m-status').value;
  const priority = document.getElementById('m-priority').value;

  if (editingTask) {

    const r = await window.dataSdk.update(updated);
    if (r.isOk) { addAudit('updated', title); }
  } else {

  }
  showModal = false;
  renderDashboard();
}

async function changeStatus(id, status) {
  if (!status) return;
  const t = tasks.find(x => x.__backendId === id);
  if (!t) return;
  const r = await window.dataSdk.update({ ...t, status });
  if (r.isOk) addAudit('updated status of', t.title);
}

async function deleteTask(id) {
  const t = tasks.find(x => x.__backendId === id);
  if (!t) return;
  const r = await window.dataSdk.delete(t);
  if (r.isOk) addAudit('deleted', t.title);
}

function addAudit(action, task) {
  auditLog.unshift({ user: currentUser.name, action, task, time: new Date().toLocaleTimeString() });
}

renderLogin();
